<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Video Spam</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* Bakgrunn med mange videoer */
        .video-container {
            display: flex;
            flex-wrap: wrap;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 20vw; /* Juster denne for flere/færre videoer */
            height: auto;
            flex-grow: 1;
            object-fit: cover;
        }

        /* Blinkende smilefjes */
        .smiley {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            color: yellow;
            z-index: 100;
            animation: blink 0.2s infinite;
            pointer-events: none;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="smiley">☺</div>

    <div class="video-container" id="grid">
        <!-- Videoene genereres av JavaScript -->
    </div>

    <script>
        const grid = document.getElementById('grid');
        const videoUrl = "https://dn721809.ca.archive.org/0/items/youtube-xvFZjo5PgG0/xvFZjo5PgG0.webm";
        
        // Lager 50 kopier av videoen for å fylle skjermen
        for (let i = 0; i < 50; i++) {
            const v = document.createElement('video');
            v.src = videoUrl;
            v.autoplay = true;
            v.loop = true;
            v.muted = true; // De fleste nettlesere krever mute for autoplay
            v.playsInline = true;
            grid.appendChild(v);
        }
    </script>
</body>
</html>
